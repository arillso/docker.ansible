---
name: Registry Cleanup

"on":
    schedule:
        # Runs monthly on the 1st at 2:00 UTC
        - cron: "0 2 1 * *"
    workflow_dispatch:

permissions:
    contents: read
    packages: write

jobs:
    cleanup:
        uses: arillso/.github/.github/workflows/cleanup-container-registry.yml@2026-03-08
        with:
            image_names: ansible
            enable_dockerhub: true
            dockerhub_repository: arillso/ansible
            dockerhub_username: sbaerlocher
        secrets:
            dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
            github_token: ${{ secrets.GITHUB_TOKEN }}
