---
name: Nightly Security Scan
run-name: |
    Security Scan by @${{ github.actor }}

"on":
    schedule:
        - cron: "0 2 * * *" # Daily 02:00 UTC (public repo — Actions minutes are free)
    workflow_dispatch:
    workflow_call:
        inputs:
            upload-sarif:
                description: "Upload SARIF results to GitHub Code Scanning"
                type: boolean
                default: true

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: read
    security-events: write

jobs:
    trivy:
        name: Trivy Scan
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

            # Runs before the build on purpose: the build uses cache-from, so a
            # layer cache-hit means `apk add` never executes and never touches
            # the proxy — which is exactly how pinned packages fall out of the
            # 21-day atime eviction and 404 on the next real build. Fetching the
            # pins directly keeps them warm and fails here, while there is still
            # time to react, rather than in a release build.
            - name: Warm apk pin cache
              run: ./.github/scripts/warm-apk-pins.sh

            - name: Build image for scanning
              uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
              with:
                  context: .
                  push: false
                  load: true
                  tags: ansible:scan
                  cache-from: type=registry,ref=ghcr.io/arillso/ansible-cache:latest
                  cache-to: type=gha,mode=max
                  provenance: false
                  sbom: false

            - name: Run Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  image-ref: "ansible:scan"
                  format: "sarif"
                  output: "trivy-results.sarif"
                  severity: "CRITICAL,HIGH"

            - name: Upload Trivy scan results
              uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
              # Upload unless a caller explicitly opts out. On schedule /
              # workflow_dispatch there is no `inputs` context, so the bare
              # `inputs.upload-sarif != false` evaluated false and silently
              # skipped the upload — leaving Code Scanning stale. Skip only
              # when a workflow_call caller passes upload-sarif: false.
              if: ${{ always() && !(github.event_name == 'workflow_call' && inputs.upload-sarif == false) }}
              with:
                  sarif_file: "trivy-results.sarif"

    secrets:
        name: Secret Scanning
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
              with:
                  fetch-depth: 0

            - name: TruffleHog scan
              uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
              with:
                  path: ./
                  base: ${{ github.event.pull_request.base.sha || 'HEAD~1' }}
                  head: HEAD
                  extra_args: --only-verified
